<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f5fc2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="数据库刷题" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/app-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/app-icon.svg" />
  <title>数据库概论刷题台</title>
  <style>
    :root {
      --ink: #182230;
      --muted: #667085;
      --line: #d7dce6;
      --soft: #f4f7fb;
      --card: rgba(255, 255, 255, 0.94);
      --accent: #0f5fc2;
      --accent-2: #14866d;
      --accent-soft: #e8f1ff;
      --ok: #07845f;
      --ok-soft: #e7f7ef;
      --bad: #c2352d;
      --bad-soft: #fdeceb;
      --warn: #a55b00;
      --shadow: 0 18px 48px rgba(24, 34, 48, 0.13);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(246,249,253,0.96), rgba(238,243,249,0.98)),
        url("./pwa-background.svg");
      background-size: cover;
      background-position: center;
    }

    button, select { font: inherit; }

    .app {
      width: min(1240px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(78px, 1fr));
      gap: 10px;
      min-width: 520px;
    }

    .stat {
      min-height: 74px;
      border: 1px solid rgba(215,220,230,0.92);
      border-radius: 8px;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 8px 24px rgba(24,34,48,0.08);
      padding: 12px 14px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .stat strong {
      font-size: 22px;
      line-height: 1;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      margin: 6px 0 14px;
      padding: 12px;
      border: 1px solid rgba(215,220,230,0.92);
      border-radius: 8px;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 10px 30px rgba(24,34,48,0.08);
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      padding: 0 12px;
    }

    .btn {
      min-height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    .btn:hover { transform: translateY(-1px); border-color: var(--accent); }
    .btn.primary { color: #fff; border-color: var(--accent); background: var(--accent); }
    .btn.ghost { color: var(--accent); background: var(--accent-soft); border-color: #c8dbfb; }
    .btn.active { color: #fff; border-color: var(--warn); background: var(--warn); }
    .btn.danger { color: var(--bad); border-color: rgba(194,53,45,0.35); background: var(--bad-soft); }

    .progress {
      height: 10px;
      border: 1px solid rgba(215,220,230,0.92);
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 180ms ease;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 16px;
      align-items: start;
    }

    .quiz {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .quiz-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(250,252,255,0.95);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.source {
      color: #344054;
      background: #eef2f7;
    }

    .status {
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }

    .question {
      padding: 24px 24px 14px;
    }

    .question h2 {
      margin: 0;
      font-size: clamp(20px, 2.6vw, 28px);
      line-height: 1.42;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 12px;
      padding: 0 24px 18px;
    }

    .option {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 60px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .option:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: #fbfdff;
    }

    .option:disabled { cursor: default; }

    .letter {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--soft);
      font-weight: 900;
    }

    .mark {
      min-width: 28px;
      font-size: 22px;
      text-align: right;
    }

    .option.correct { border-color: rgba(7,132,95,0.55); background: var(--ok-soft); }
    .option.correct .letter { color: #fff; border-color: var(--ok); background: var(--ok); }
    .option.wrong { border-color: rgba(194,53,45,0.55); background: var(--bad-soft); }
    .option.wrong .letter { color: #fff; border-color: var(--bad); background: var(--bad); }

    .explain {
      display: none;
      margin: 0 24px 22px;
      padding: 15px 16px;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: #f7fbff;
      color: #344054;
      line-height: 1.65;
    }

    .explain strong { color: var(--accent); }

    .work-area {
      display: grid;
      gap: 12px;
      padding: 0 24px 18px;
    }

    .blank-input,
    .answer-box {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .blank-input {
      min-height: 46px;
      padding: 0 13px;
    }

    .answer-box {
      min-height: 150px;
      resize: vertical;
      padding: 12px 13px;
      line-height: 1.6;
    }

    .answer-card {
      display: none;
      padding: 15px 16px;
      border: 1px solid #c8dbfb;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: #f7fbff;
      color: #344054;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .answer-card strong {
      color: var(--accent);
    }

    .self-actions {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn.ok { color: #fff; border-color: var(--ok); background: var(--ok); }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-top: 1px solid var(--line);
      background: rgba(250,252,255,0.95);
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 10px 30px rgba(24,34,48,0.1);
      padding: 16px;
    }

    .panel h3 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .grid-nav {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      max-height: 320px;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-q {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .nav-q.current { color: #fff; border-color: var(--accent); background: var(--accent); }
    .nav-q.ok { border-color: rgba(7,132,95,0.4); background: var(--ok-soft); color: var(--ok); }
    .nav-q.bad { border-color: rgba(194,53,45,0.4); background: var(--bad-soft); color: var(--bad); }
    .nav-q.current.ok, .nav-q.current.bad { color: #fff; background: var(--accent); border-color: var(--accent); }

    .breakdown {
      display: grid;
      gap: 8px;
    }

    .break-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
    }

    .break-item strong { color: var(--accent); }

    .wrong-list {
      display: grid;
      gap: 8px;
      max-height: 300px;
      overflow: auto;
      padding-right: 2px;
    }

    .wrong-item {
      display: grid;
      gap: 5px;
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(194,53,45,0.24);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .wrong-item:hover {
      border-color: var(--bad);
      background: #fff8f8;
    }

    .wrong-item strong {
      color: var(--bad);
      font-size: 13px;
    }

    .wrong-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .empty {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    @media (max-width: 940px) {
      header, main { grid-template-columns: 1fr; }
      .stats { min-width: 0; }
    }

    @media (max-width: 640px) {
      .app { width: min(100vw - 18px, 1240px); padding-top: 16px; }
      .stats, .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar .btn { grid-column: 1 / -1; }
      .quiz-head { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .option { grid-template-columns: 32px 1fr auto; }
      .letter { width: 32px; height: 32px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>数据库概论刷题台</h1>
        <p class="subtitle">已录入数据库卷中可识别的选择、填空、判断和简答题；主观题先作答，再显示参考答案并自评。</p>
      </div>
      <div class="stats">
        <div class="stat"><span>当前</span><strong id="count">1 / 110</strong></div>
        <div class="stat"><span>已答</span><strong id="done">0</strong></div>
        <div class="stat"><span>正确</span><strong id="right">0</strong></div>
        <div class="stat"><span>错题</span><strong id="wrongCount">0</strong></div>
        <div class="stat"><span>正确率</span><strong id="rate">0%</strong></div>
      </div>
    </header>

    <section class="toolbar">
      <div class="field">
        <label for="sourceFilter">按试卷筛选</label>
        <select id="sourceFilter"></select>
      </div>
      <div class="field">
        <label for="topicFilter">按知识点筛选</label>
        <select id="topicFilter"></select>
      </div>
      <button class="btn" id="wrongMode" type="button">只看错题</button>
      <button class="btn ghost" id="shuffle" type="button">随机顺序</button>
    </section>

    <div class="progress"><div id="bar"></div></div>

    <main>
      <section class="quiz" aria-live="polite">
        <div class="quiz-head">
          <div class="meta">
            <span class="pill source" id="source"></span>
            <span class="pill" id="topic"></span>
          </div>
          <strong class="status" id="status">请选择一个答案</strong>
        </div>
        <div class="question">
          <h2 id="question"></h2>
        </div>
        <div class="options" id="options"></div>
        <p class="explain" id="explain"></p>
        <div class="actions">
          <button class="btn" id="prev" type="button">上一题</button>
          <button class="btn primary" id="next" type="button">下一题</button>
          <button class="btn" id="reset" type="button">重置答题</button>
        </div>
      </section>

      <aside class="side">
        <div class="panel">
          <h3>题号导航</h3>
          <div class="grid-nav" id="nav"></div>
        </div>
        <div class="panel">
          <h3>知识点统计</h3>
          <div class="breakdown" id="breakdown"></div>
        </div>
        <div class="panel">
          <h3>我的错题</h3>
          <div class="wrong-list" id="wrongList"></div>
          <button class="btn danger" id="clearWrong" type="button" style="width:100%; margin-top:12px;">清空错题本</button>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const q = (source, no, topic, text, options, answer, explain) => ({
      type: "choice", source, no, topic, text, options, answer: "ABCD".indexOf(answer), explain
    });
    const blank = (source, no, topic, text, answers, explain) => ({
      type: "blank", source, no, topic, text, answers, explain
    });
    const judge = (source, no, topic, text, answer, explain) => ({
      type: "judge", source, no, topic, text, answer, explain
    });
    const short = (source, no, topic, text, sample, explain = "主观题按意思评分：核心概念、关键关系和表达逻辑对即可。") => ({
      type: "short", source, no, topic, text, sample, explain
    });

    const allQuestions = [
      q("2025 A卷", "1", "关系代数", "分别用于实现关系代数投影运算和选择运算的 SQL 子句是？", ["SELECT 和 WHERE", "FROM 和 SELECT", "SELECT 和 FROM", "WHERE 和 SELECT"], "A", "投影是取列，对应 SELECT；选择是取满足条件的行，对应 WHERE。"),
      q("2025 A卷", "2", "SQL 分类", "下述选项中，哪一项不是数据操纵语句？", ["INSERT", "UPDATE", "DELETE", "CREATE"], "D", "INSERT、UPDATE、DELETE 是 DML；CREATE 是 DDL，用来定义数据库对象。"),
      q("2025 A卷", "3", "关系代数", "设关系模式 R(X,Y) 和 S(Y,Z)，若 R 有 n 个元组、S 有 m 个元组，则 R ÷ S 所得关系中元组数量不可能为？", ["m", "m + n", "0", "m - n"], "B", "除法结果来自 R 中能匹配 S 全部相关值的 X，结果规模不会简单等于 m+n。"),
      q("2025 A卷", "4", "E-R 转换", "从 E-R 模型向关系模型转换时，一个 M:N 联系转为关系模式时，该关系模式的主码是？", ["M 端实体型的主码", "N 端实体型的主码", "M 端实体型主码与 N 端实体型主码的组合", "其他"], "C", "多对多联系需要单独成表，主码通常由两端实体主码共同组成。"),
      q("2025 A卷", "5", "并发控制", "若事务 T 对数据对象 R 实行 X 封锁，则 T 对 R 可以？", ["只能读不能写", "只能写不能读", "既可读又可写", "不能读也不能写"], "C", "X 锁是排他锁，加锁事务自己可以读写，被排斥的是其他事务。"),
      q("2025 A卷", "6", "并发控制", "解决由并发控制带来的数据不一致问题时，普通采用的技术是？", ["封锁", "存取控制", "恢复", "协商"], "A", "并发不一致通常靠封锁协议等并发控制技术处理。"),
      q("2025 A卷", "7", "连接运算", "关系 R 与关系 S 只有 1 个公共属性，T1 是 R 与 S 等值连接结果，T2 是 R 与 S 自然连接结果，则？", ["T1 的属性个数 = T2 的属性个数", "T1 的属性个数 < T2 的属性个数", "T1 的属性个数 > T2 的属性个数", "T1 的属性个数 ≥ T2 的属性个数"], "C", "等值连接保留两个参与比较的公共属性，自然连接会去掉重复公共属性。"),
      q("2025 A卷", "8", "规范化", "关系数据库的规范化理论主要解决的问题是？", ["如何构造合适的数据逻辑结构", "如何构造合适的数据物理结构", "如何构造合适的应用程序界面", "如何控制不同用户的数据操作权限"], "A", "规范化研究关系模式是否合理，属于逻辑结构设计。"),
      q("2025 A卷", "9", "SQL 空值", "SQL 语句中，下列涉及空值的操作，不正确的是？", ["AGE IS NULL", "AGE IS NOT NULL", "AGE = NULL", "NOT (AGE IS NULL)"], "C", "NULL 不能用 = 比较，应使用 IS NULL 或 IS NOT NULL。"),
      q("2025 A卷", "10", "规范化", "2NF 规范到 3NF 是为了消除？", ["非主属性对码的部分函数依赖", "主属性对码的部分函数依赖", "非主属性对码的传递函数依赖", "以上都不是"], "C", "2NF 消除部分依赖，3NF 进一步消除非主属性对码的传递依赖。"),
      q("2025 A卷", "11", "数据独立性", "为了保证数据的物理独立性，需要修改的是？", ["模式", "模式与内模式之间的映像", "外模式", "模式与外模式之间的映像"], "B", "内模式变化由模式/内模式映像吸收，从而保证物理独立性。"),
      q("2025 A卷", "12", "SQL 查询", "SELECT 语句中每行只写一个子句，若有 ORDER BY 子句，则其应在？", ["SELECT 子句的下一行", "WHERE 子句的下一行", "最后一行", "任意一行"], "C", "ORDER BY 用于最终排序，书写时通常放在查询语句最后。"),
      q("2025 A卷", "13", "子查询", "以下关于相关子查询的描述中，正确的是？", ["先执行子查询", "子查询的查询条件与父查询中数据表无关", "父查询和子查询交替执行", "子查询执行一次"], "C", "相关子查询依赖外层查询当前行，通常随外层行反复求值。"),
      q("2025 A卷", "14", "关系模型", "下列关于关系的理解，错误的是？", ["在一个关系中，可以任意交换两个元组的顺序", "在一个关系中，可以任意交换两个列的顺序", "每个列必须有自己的名字且必须取自不同的域", "关系中的属性不可再分"], "C", "列名应唯一，但不同属性可以取自同一域，例如两个日期字段。"),
      q("2025 A卷", "15", "关系异常", "设有关系模式：选修(学号, 教师号, 课程号, 成绩)，主码为学号和课程号。若学生 A 没有选修任何课程，则该关系模式存在的问题是？", ["数据冗余", "删除异常", "更新异常", "插入异常"], "D", "没有课程号时无法插入单独的学生信息，这是插入异常。"),

      short("2023 A卷", "关系代数3", "关系代数", "查询选修了“软件测试”课程的学生学号、姓名和成绩。", "Course 先选课程名='软件测试'，再与 SC、Student 连接，最后投影学号、姓名、成绩。"),
      short("2023 A卷", "E-R转换", "简答：E-R 转关系", "将 E-R 图转换为关系模式时，主键、外键如何确定？", "实体一般各转一个关系，实体标识符作主键；1:N 联系把 1 端主键加入 N 端作外键；M:N 联系单独成表，两端主键组合为主键并同时作外键；联系属性放入联系表或 N 端表。"),
      short("2023 A卷", "SQL1", "SQL 操作", "写 SQL：创建 Employee 表和 Salary 表，并定义实体完整性、参照完整性和邮箱包含 @ 的约束。", "Employee 可用员工编号作 PRIMARY KEY，邮箱加 CHECK(email LIKE '%@%')；Salary 可用(月份,员工编号)作主键，员工编号作 FOREIGN KEY REFERENCES Employee(员工编号)。"),
      short("2023 A卷", "SQL2", "SQL 操作", "写 SQL：将编号为 E06 的雇员 7 月份基本工资改为 1500，岗位津贴改为 1000。", "UPDATE Salary SET 基本工资=1500, 岗位津贴=1000 WHERE 雇员编号='E06' AND 月份=7;"),
      short("2023 A卷", "SQL3", "SQL 操作", "写 SQL：查询基本工资总额大于 6000 元的雇员编号、姓名、工资发放次数、基本工资总额和月平均基本工资。", "Employee 与 Salary 按雇员编号连接，GROUP BY 雇员编号、姓名，HAVING SUM(基本工资)>6000，SELECT 中使用 COUNT(*)、SUM(基本工资)、AVG(基本工资)。"),

      blank("A卷组1", "填空1", "填空：关系术语", "二维表中的行称为____，列称为____。", [["元组", "记录"], ["属性", "字段"]], "关系模型中，一行是元组/记录，一列是属性/字段。"),
      blank("A卷组1", "填空2", "填空：SQL 分类", "CREATE、DROP、ALTER 属于 SQL 的____语言；INSERT、UPDATE、DELETE 属于____语言。", [["DDL", "数据定义语言"], ["DML", "数据操纵语言"]], "DDL 定义对象结构，DML 操纵数据。"),
      blank("A卷组1", "填空3", "填空：关系代数", "关系代数中，选择运算符是____，投影运算符是____。", [["σ", "sigma"], ["π", "pi"]], "σ 选行，π 选列。"),
      blank("A卷组1", "填空4", "填空：事务", "事务的四个特性 ACID 分别是____、____、____、____。", [["原子性"], ["一致性"], ["隔离性"], ["持久性"]], "ACID 是事务题的必背点。"),
      blank("A卷组1", "填空5", "填空：外码", "若 R 中属性引用 S 的主码，则该属性在 R 中称为____。", [["外码", "外键"]], "引用其他关系主码的属性叫外码/外键。"),
      judge("A卷组1", "判断1", "判断：关系模型", "关系中允许出现两个完全相同的元组。", false, "关系是集合，集合中不允许重复元素。"),
      judge("A卷组1", "判断2", "判断：实体完整性", "主码中的属性可以取空值。", false, "实体完整性要求主码不能为空。"),
      judge("A卷组1", "判断3", "判断：事务", "事务提交后，对数据库的改变应当永久保存。", true, "这是事务的持久性。"),
      judge("A卷组1", "判断4", "判断：触发器", "SELECT 操作通常会激活基于数据修改的触发器。", false, "常见 DML 触发器由 INSERT、UPDATE、DELETE 激活。"),
      judge("A卷组1", "判断5", "判断：视图", "视图一定存储完整的实际数据。", false, "视图通常是虚表，存储的是定义而不是完整数据。"),
      short("A卷组1", "简答1", "简答：数据库设计", "数据库设计为什么要先进行概念结构设计？", "概念结构设计先用 E-R 模型抽象现实业务，独立于具体 DBMS，便于和用户沟通并为后续逻辑设计提供基础。"),
      short("A卷组1", "简答2", "简答：关系模式分解", "关系模式分解时为什么要关注无损连接和保持函数依赖？", "无损连接保证分解后的关系能还原原关系，不丢失信息；保持函数依赖保证约束仍能在分解后的模式上有效检查。"),
      short("A卷组1", "简答3", "简答：规范化作用", "数据库规范化的主要作用是什么？", "减少数据冗余，避免插入异常、删除异常、更新异常，提高数据一致性。"),
      short("A卷组1", "简答4", "简答：并发异常", "并发事务可能导致哪些数据不一致问题？", "典型问题包括丢失修改、读脏数据、不可重复读，也可能出现幻读等。"),
      short("A卷组1", "简答5", "简答：两段锁", "两段锁协议的基本思想是什么？", "事务分为加锁阶段和解锁阶段：先只申请锁，不释放锁；一旦释放锁，就不能再申请新锁。它可保证冲突可串行化。"),

      blank("A卷组2", "填空1", "填空：三级模式", "数据库三级模式包括____、____、____。", [["外模式"], ["模式", "概念模式"], ["内模式"]], "三级模式是外模式、模式、内模式。"),
      blank("A卷组2", "填空2", "填空：完整性", "关系模型的三类完整性约束是____、____、____。", [["实体完整性"], ["参照完整性"], ["用户定义的完整性", "用户自定义完整性"]], "三类完整性约束是实体、参照、用户定义完整性。"),
      blank("A卷组2", "填空3", "填空：封锁", "X 锁又称____锁，S 锁又称____锁。", [["排他锁", "写锁"], ["共享锁", "读锁"]], "X 锁用于写，排斥其他读写；S 锁用于读，可共享读。"),
      blank("A卷组2", "填空4", "填空：子查询", "SQL 中常用于引出子查询的谓词包括 IN、EXISTS 和____运算。", [["比较", "比较运算"]], "比较运算符也可以与子查询配合，如 > (SELECT ...)。"),
      blank("A卷组2", "填空5", "填空：聚集函数", "COUNT(*) 统计的是____，COUNT(列名) 通常不统计该列为____的行。", [["行数", "记录数"], ["NULL", "空值"]], "COUNT(*) 不忽略空行；COUNT(列名) 忽略该列为 NULL 的行。"),
      judge("A卷组2", "判断1", "判断：SQL 空值", "SQL 中判断某列为空可以写成 列名 = NULL。", false, "应写 IS NULL，不能用 = NULL。"),
      judge("A卷组2", "判断2", "判断：外码", "外码列的名称必须与被引用列名称完全相同。", false, "外码列名可以不同，只要引用关系和类型相容。"),
      judge("A卷组2", "判断3", "判断：自然连接", "自然连接必须至少有公共属性。", true, "自然连接按公共属性自动匹配。"),
      judge("A卷组2", "判断4", "判断：3NF", "3NF 主要消除非主属性对码的传递依赖。", true, "从 2NF 到 3NF 的核心就是消除传递依赖。"),
      judge("A卷组2", "判断5", "判断：逻辑独立性", "逻辑独立性通常通过模式与内模式之间的映像实现。", false, "模式/内模式映像保证物理独立性；外模式/模式映像保证逻辑独立性。"),
      short("A卷组2", "简答1", "简答：ER 联系转换", "1:1、1:N、M:N 联系转换为关系模式时有什么区别？", "1:1 可在任一方加入对方主码作外码；1:N 通常把 1 端主码加入 N 端作外码；M:N 必须单独建立关系，通常以两端主码组合作主码。"),
      short("A卷组2", "简答2", "简答：候选码求法", "求候选码的一般思路是什么？", "先找不出现在任何依赖右部的属性，它们通常必须属于候选码；再与其他属性组合求闭包，能推出全部属性且没有冗余的最小属性集就是候选码。"),
      short("A卷组2", "简答3", "简答：视图优点", "视图在数据库中的作用有哪些？", "简化用户操作，提供不同用户视角，提高安全性，增强逻辑独立性，也可隐藏复杂查询和敏感字段。"),
      short("A卷组2", "简答4", "简答：恢复", "数据库恢复的基本目标是什么？", "在故障后把数据库恢复到某个正确、一致的状态，保证已提交事务的结果保留，未提交事务的影响撤销。"),
      short("A卷组2", "简答5", "简答：安全性与完整性", "数据库安全性和完整性有什么区别？", "安全性关注防止非法用户和非法操作；完整性关注数据是否正确、有效、相容。一个管“谁能做”，一个管“数据对不对”。"),

      short("2025 A卷", "数据定义1", "SQL 操作", "已知会议 C(C#, CNAME, CLOCATION, STARTTIME, ENDTIME)、参会 PC(P#, C#, PCTYPE)、人员 P(P#, PNAME, PSEX, PAFF)，用 SQL 查询“检索张三参加会议的会议名称”。", "SELECT C.CNAME FROM C JOIN PC ON C.C#=PC.C# JOIN P ON PC.P#=P.P# WHERE P.PNAME='张三'; 关键是人员表按姓名筛选，再经参会表连接会议表，最后投影会议名称。"),
      short("2025 A卷", "数据定义2", "SQL 操作", "用 SQL 查询“检索数据库研讨班、大数据技术和数据挖掘技术三个会议都参加了的人员名称”。", "一种写法：SELECT P.PNAME FROM P JOIN PC ON P.P#=PC.P# JOIN C ON PC.C#=C.C# WHERE C.CNAME IN ('数据库研讨班','大数据技术','数据挖掘技术') GROUP BY P.P#,P.PNAME HAVING COUNT(DISTINCT C.CNAME)=3; 核心是分组后要求三种会议都出现。"),
      short("2025 A卷", "数据定义3", "SQL 建表", "使用教材中的 SQL 标准创建“参会”表，要求指定主键、外键和取值范围。", "CREATE TABLE PC(P# CHAR(10), C# CHAR(10), PCTYPE VARCHAR(20) CHECK(PCTYPE IN ('口头发表','海报发表','主题演讲者')), PRIMARY KEY(P#,C#), FOREIGN KEY(P#) REFERENCES P(P#), FOREIGN KEY(C#) REFERENCES C(C#)); 类型长度可按题目要求调整，关键是主键、两个外键和 PCTYPE 的 CHECK 约束。"),
      short("2025 A卷", "数据定义4", "SQL 查询", "查询“检索参加了开始时刻早于数据库研讨班开始时刻的会议的人员所在单位名称”，要求查询结果只包含单位名称且不重复。", "SELECT DISTINCT P.PAFF FROM P JOIN PC ON P.P#=PC.P# JOIN C ON PC.C#=C.C# WHERE C.STARTTIME < (SELECT STARTTIME FROM C WHERE CNAME='数据库研讨班'); 若数据库研讨班可能多场，可用 MIN(STARTTIME) 或限定会议编号。"),
      short("2025 A卷", "概念设计1", "E-R 图", "工厂生产若干产品，每种产品由不同零件组成；有的零件可用于不同产品；零件由不同原材料制成，不同零件所用材料可相同；零件按所属产品存放在仓库中，原材料按类别存放在若干仓库中。请给出 E-R 设计思路。", "可识别实体：产品、零件、原材料、仓库、材料类别。联系：产品-零件为 M:N 的组成联系；零件-原材料为 M:N 的使用/制成联系；产品-仓库存放零件可建存放联系并带数量/位置；材料类别-原材料为 1:N；材料类别/原材料-仓库为存放联系。若题目要求属性，应补产品号、零件号、材料号、仓库号等标识属性。"),
      short("2025 A卷", "分析设计1", "函数依赖", "设关系模式 R<U,F>，U={A,B,C,D,E,G}，F={AE→D, AG→C, BE→G, EG→D, ABE→DC, G→A}。求属性集 EG 关于 F 的闭包。", "EG+ 初始为 {E,G}；由 G→A 得 A；有 A、G 得 AG→C，加入 C；有 E、G 得 EG→D，加入 D。最终 EG+={A,C,D,E,G}，不能推出 B。"),
      short("2025 A卷", "分析设计2", "函数依赖", "同一关系模式 R<U,F> 中，求 R 的全部候选码。", "B 不出现在任何依赖右部，因此每个候选码必须含 B。BG+ 可由 G→A 得 A，再 AG→C 得 C，BE→G 需要 E，无法得到 E；BE+ 可得 G，再得 A、C、D，包含全部属性，所以 BE 是候选码。AB E 的真子集 BE 已是码，因此 ABE 不是候选码。候选码为 BE。"),
      short("2025 A卷", "分析设计3", "范式判断", "同一关系模式 R<U,F> 中，判断 R 满足的最高范式并说明原因。", "候选码为 BE，主属性为 B、E。存在 G→A、G→C 等依赖，G 不是超码，A/C 为非主属性；也存在 BE→G→A 的传递依赖。因此该关系不满足 3NF。由于所有属性原子，通常最高为 1NF；若题目默认已为 1NF，则答 1NF 并说明存在非主属性对候选码的传递依赖。"),
      short("2025 A卷", "逻辑设计1", "E-R 转关系", "根据商店、厂家、商品和订购联系的 E-R 图，将其转换为关系模型并说明主码、外码。", "可转换为：商店(商店编号, 商店名, 联系电话)，主码商店编号；厂家(厂家编号, 联系地址, 联系电话)，主码厂家编号；商品(商品编号, 商品名称, 商品分类, 库存量)，主码商品编号；订购(商店编号, 厂家编号, 商品编号, 订购日期, 订购数量)，主码可取(商店编号,厂家编号,商品编号,订购日期)，其中三个编号分别为外码引用对应实体。若图中订购不直接关联商品，可按图的三元联系解释。"),

      short("2024 B卷", "E-R转换1", "E-R 转关系", "将教师、学生、课程、班级及选修/授课等 E-R 图转换为关系模式，并说明主码和外码。", "可得：教师(教师号,姓名,身份证号,性别)，主码教师号；学生(学号,姓名,年龄,性别,班级号)，主码学号，班级号为外码；课程(课程号,课程名称,学分,学时)，主码课程号；班级(班级号,班级名称,辅导员)，主码班级号；选修(学号,课程号,成绩)，主码(学号,课程号)，分别外键引用学生和课程；授课(教师号,课程号,班级号,开课日期,评价)，主码可取(教师号,课程号,班级号)，分别引用教师、课程、班级。"),
      short("2024 B卷", "概念设计1", "E-R 图", "运输集团包含多个运输公司、调度员、车辆、运输任务等信息。请给出数据库 E-R 图设计思路。", "实体可包括公司、调度员、车辆、运输任务。公司拥有多个调度员和车辆；每个调度员属于一个公司；车辆有牌照号、发动机号、车型、吨位等；运输任务有任务号、出发日期、目的地等。联系可包括公司-调度员 1:N、公司-车辆 1:N、调度员-运输任务 1:N、车辆-运输任务 M:N 或 1:N，并可在联系中记录使用时间、任务状态等。"),
      short("2024 B卷", "分解3", "函数依赖", "俱乐部会员信息(俱乐部名称,成立年份,人数,地点,学号,姓名,性别,出生年份,加入俱乐部时间) 中，写出基本函数依赖集和候选码。", "基本函数依赖可写为：俱乐部名称→成立年份,人数,地点；学号→姓名,性别,出生年份；(俱乐部名称,学号)→加入俱乐部时间。候选码为(俱乐部名称,学号)。"),
      short("2024 B卷", "分解4", "范式判断", "分析俱乐部会员信息关系模式最高属于第几范式，为什么？", "该关系主码为(俱乐部名称,学号)。非主属性成立年份、人数、地点只依赖于俱乐部名称；姓名、性别、出生年份只依赖于学号，都是对组合码的部分依赖。因此不满足 2NF，最高通常为 1NF。"),
      short("2024 B卷", "分解5", "3NF 分解", "将俱乐部会员信息关系模式分解为 3NF 模式集。", "可分解为：俱乐部(俱乐部名称,成立年份,人数,地点)；学生(学号,姓名,性别,出生年份)；会员(俱乐部名称,学号,加入俱乐部时间)。其中会员表的两个属性分别为外码，组合为主码。"),
      short("2024 B卷", "车辆SQL1", "SQL 建表", "车辆维修数据包含 Vehicle(车牌号,类别,启用年份,维修费用,备注) 和 Riding(日期,车牌号,实际行驶里程,燃油费,过路费)。写 SQL 创建两表并定义实体完整性、参照完整性和类别约束。", "可写：CREATE TABLE Vehicle(车牌号 CHAR(10) PRIMARY KEY, 类别 INT CHECK(类别 IN (1,2,3,4)), 启用年份 INT, 维修费用 DECIMAL(10,2), 备注 VARCHAR(100)); CREATE TABLE Riding(日期 DATE, 车牌号 CHAR(10), 实际行驶里程 INT, 燃油费 DECIMAL(10,2), 过路费 DECIMAL(10,2), PRIMARY KEY(日期,车牌号), FOREIGN KEY(车牌号) REFERENCES Vehicle(车牌号));"),
      short("2024 B卷", "车辆SQL2", "SQL 插入", "写出将 Vehicle 和 Riding 表前三行示例数据分别插入相应表中的 SQL 语句。", "按表格逐行 INSERT 即可。例如 Vehicle: INSERT INTO Vehicle VALUES('AX1320',1,2020,1500.00,'维修2次'); INSERT INTO Vehicle VALUES('AT2511',3,2018,2000.00,'大修1次'); INSERT INTO Vehicle VALUES('AX1324',2,2023,NULL,NULL); Riding: INSERT INTO Riding VALUES('2024-01-01','AX1320',300,50.00,80); INSERT INTO Riding VALUES('2024-01-01','AX1324',400,60.00,90); INSERT INTO Riding VALUES('2024-01-02','AX1320',350,52.00,0);"),
      short("2024 B卷", "车辆SQL3", "SQL 更新", "写 SQL：将车牌号为 AX1324 的车辆 2024 年 1 月 3 日的实际行驶里程改为 150，过路费改为 50。", "UPDATE Riding SET 实际行驶里程=150, 过路费=50 WHERE 车牌号='AX1324' AND 日期='2024-01-03';"),
      short("2024 B卷", "车辆SQL4", "SQL 分组查询", "写 SQL：查询累计实际行驶总里程大于 6000 的车辆，显示车牌号、类别、出车次数、实际行驶总里程、燃油费累计、过路费累计、合计费用。", "SELECT V.车牌号,V.类别,COUNT(*) AS 出车次数,SUM(R.实际行驶里程) AS 实际行驶总里程,SUM(R.燃油费) AS 燃油费累计,SUM(R.过路费) AS 过路费累计,SUM(R.燃油费+R.过路费) AS 合计费用 FROM Vehicle V JOIN Riding R ON V.车牌号=R.车牌号 GROUP BY V.车牌号,V.类别 HAVING SUM(R.实际行驶里程)>6000;"),
      short("2024 B卷", "车辆SQL5", "SQL 分组查询", "写 SQL：统计维修费用大于车辆平均维修费用的车辆的车牌号、启用年份和维修费用。", "SELECT 车牌号,启用年份,维修费用 FROM Vehicle WHERE 维修费用 > (SELECT AVG(维修费用) FROM Vehicle WHERE 维修费用 IS NOT NULL); 若题目按类别统计平均值，可改为相关子查询按类别比较。"),

      short("2023 A卷", "概念设计1", "E-R 图", "线上书店销售系统：书店销售多种图书，同一图书只在一家线上店销售；顾客可订购图书，需记录订单数量和发货时间。请设计 E-R 图。", "实体：线上店(店编号,名称,联系电话)、图书(ISBN,书名,作者,库存数量,价格,出版社)、顾客(顾客编号,账号,联系电话,地址)。联系：线上店-图书为 1:N 的销售/上架；顾客-图书为 M:N 的订购联系，联系属性包括订购数量、发货时间。也可增加订单实体表示一次订购。"),
      short("2023 A卷", "E-R转换2", "E-R 转关系", "将海运公司、船员、船舶、出海等 E-R 图转换为关系模式，并注明主码、外码。", "可转换为：海运公司(公司编号,公司名称,办公地点)，主码公司编号；船员(船员编号,姓名,年龄,公司编号)，主码船员编号，公司编号外码引用海运公司；船舶(船舶编号,船舶名称,颜色,公司编号)，主码船舶编号，公司编号外码引用海运公司；出海(船员编号,船舶编号,天数)，主码(船员编号,船舶编号)，两个属性分别外码引用船员、船舶；若船员之间有领导关系，可在船员表加入领导船员编号作自引用外码。"),
      short("2023 A卷", "分解1", "函数依赖", "出车记录表(驾照号,姓名,驾龄,汽车牌照号,车型,购置年份,出车日期,目的地) 中，每位驾驶员一天只驾驶同一车辆完成一次运输业务。写出基本函数依赖和候选码。", "基本依赖可写：驾照号→姓名,驾龄；汽车牌照号→车型,购置年份；(驾照号,出车日期)→汽车牌照号,目的地；若一天一车一次且车辆同日不重复，也可有(汽车牌照号,出车日期)→驾照号,目的地。候选码通常取(驾照号,出车日期)，按题意也可说明(汽车牌照号,出车日期)是否为候选码。"),
      short("2023 A卷", "分解2", "范式判断", "分析出车记录表最高属于第几范式，为什么？", "若候选码为(驾照号,出车日期)，则姓名、驾龄部分依赖于驾照号，车型、购置年份通过汽车牌照号传递依赖于码，因此不满足 2NF 或 3NF。一般答最高为 1NF，并说明存在部分依赖和传递依赖。"),
      short("2023 A卷", "分解3", "3NF 分解", "将出车记录表分解为 3NF 模式集。", "可分解为：驾驶员(驾照号,姓名,驾龄)；汽车(汽车牌照号,车型,购置年份)；出车(驾照号,出车日期,汽车牌照号,目的地)。出车表中驾照号和汽车牌照号分别为外码。"),
      short("2023 A卷", "SQL4", "SQL 查询", "写 SQL：查询员工工资明细，显示月份、雇员编号、姓名、基本工资、岗位工资、应发工资、扣除、实发工资。", "SELECT S.月份,S.雇员编号,E.姓名,S.基本工资,S.岗位津贴 AS 岗位工资,(S.基本工资+S.岗位津贴) AS 应发工资,S.扣除,(S.基本工资+S.岗位津贴-S.扣除) AS 实发工资 FROM Salary S JOIN Employee E ON S.雇员编号=E.雇员编号; 字段名可按题面 Salary 表调整。"),

      short("A卷组1", "关系代数1", "关系代数", "图书(编号,书名,出版社,作者,价格)、书店(编号,名称,地址)、销售(图书编号,书店编号,数量)。查询机械工业出版社出版图书的书名、作者和价格。", "π书名,作者,价格(σ出版社='机械工业出版社'(图书))。"),
      short("A卷组1", "关系代数2", "关系代数", "查询由王珊编著且价格小于 50 元的图书的书名、价格和数量。", "π书名,价格,数量(σ作者='王珊' ∧ 价格<50(图书 ⨝ 图书.图书编号=销售.图书编号 销售))。如果题目字段名为图书号，按题面替换即可。"),
      short("A卷组1", "关系代数3", "关系代数", "查询 china-pub 书店售出图书的书名、出版社和数量。", "π书名,出版社,数量(σ书店名称='china-pub'(书店 ⨝ 销售 ⨝ 图书))。核心是先选 china-pub 书店，再连接销售和图书表。"),
      short("A卷组1", "概念设计1", "E-R 图", "学生、课程、学院数据库：学生属于一个学院，学院开设课程，学生选课且每门课有一个成绩，每个学院开设若干课程。请设计 E-R 图。", "实体：学生(学号,姓名,出生日期等)、课程(课程号,课程名,学分)、学院(学院编号,学院名称,办公地点等)。联系：学院-学生为 1:N 的属于；学院-课程为 1:N 的开设；学生-课程为 M:N 的选课，联系属性为成绩。"),
      short("A卷组1", "E-R转换1", "E-R 转关系", "将部门、职工、工程及主管/承包/工作/领导联系的 E-R 图转换为关系模式，并注明主码、外码。", "可得：部门(部门编号,部门名称,办公地点,主管职工编号)，主码部门编号，主管职工编号外码引用职工；职工(职工编号,姓名,年龄,部门编号,领导职工编号)，主码职工编号，部门编号外码引用部门，领导职工编号为自引用外码；工程(工程编号,工程名称,规模,部门编号)，主码工程编号，部门编号外码引用部门；工作(职工编号,工程编号,时间)，主码(职工编号,工程编号)，分别外码引用职工、工程。"),
      short("A卷组1", "分解1", "函数依赖", "成绩(课程号,课程名称,任课教师,班级,学号,姓名,成绩) 中，每个学生选修的每门课程只有一个成绩；每门课程只有一个教师讲授。写出基本函数依赖和候选码。", "可写：课程号→课程名称,任课教师；学号→姓名,班级；(学号,课程号)→成绩。候选码为(学号,课程号)。"),
      short("A卷组1", "分解2", "范式判断", "分析成绩关系模式最高属于第几范式，为什么。", "候选码为(学号,课程号)，课程名称和任课教师只依赖课程号，姓名和班级只依赖学号，存在非主属性对组合码的部分依赖，因此不满足 2NF，最高为 1NF。"),
      short("A卷组1", "分解3", "3NF 分解", "将成绩关系模式分解为 3NF 模式集。", "可分解为：学生(学号,姓名,班级)；课程(课程号,课程名称,任课教师)；成绩(学号,课程号,成绩)。成绩表中学号、课程号为外码，组合为主码。"),
      short("A卷组1", "图书SQL1", "SQL 建表", "图书销售数据库包含图书(图书号,图书名称,出版社,出版时间,库存数量) 和 销售(发票号,图书号,单价,数量)。写 SQL 创建表并定义主键、外键。", "CREATE TABLE 图书(图书号 CHAR(10) PRIMARY KEY, 图书名称 VARCHAR(50), 出版社 VARCHAR(50), 出版时间 DATE, 库存数量 INT); CREATE TABLE 销售(发票号 CHAR(10), 图书号 CHAR(10), 单价 DECIMAL(10,2), 数量 INT, PRIMARY KEY(发票号,图书号), FOREIGN KEY(图书号) REFERENCES 图书(图书号));"),
      short("A卷组1", "图书SQL2", "SQL 插入", "写 SQL：将图书表和销售表前三行示例数据分别插入对应表。", "INSERT INTO 图书 VALUES('T001','JAVA','清华','2019-10-10',100); INSERT INTO 图书 VALUES('T002','数据库概论','高教','2015-12-10',20); INSERT INTO 图书 VALUES('T003','C语言','机械','2018-05-20',50); INSERT INTO 销售 VALUES('001','T001',45.50,10); INSERT INTO 销售 VALUES('001','T002',60.00,5); INSERT INTO 销售 VALUES('002','T001',45.50,20);"),
      short("A卷组1", "图书SQL3", "SQL 更新", "写 SQL：将编号为 9999 的发票中编号为 T530 商品的单价改为 5.00，数量改为 30。", "UPDATE 销售 SET 单价=5.00, 数量=30 WHERE 发票号='9999' AND 图书号='T530';"),
      short("A卷组1", "图书SQL4", "SQL 查询", "写 SQL：查询销售明细，显示发票号、图书号、图书名称、单价、数量、金额。", "SELECT S.发票号,S.图书号,B.图书名称,S.单价,S.数量,S.单价*S.数量 AS 金额 FROM 销售 S JOIN 图书 B ON S.图书号=B.图书号;"),

      short("A卷组2", "关系代数1", "关系代数", "Student(Sno,Sname,Sage,Ssex,Sdept)、Course(Cno,Cname,Credit)、SC(Sno,Cno,Grade)。查询信息工程系且大于 22 岁同学的学号和姓名。", "πSno,Sname(σSdept='信息工程系' ∧ Sage>22(Student))。"),
      short("A卷组2", "关系代数2", "关系代数", "查询选修 5 号课程且成绩大于 60 的学生学号、姓名和成绩。", "πSno,Sname,Grade(Student ⨝ σCno='5' ∧ Grade>60(SC))。若 Cno 为数字类型可不加引号。"),
      short("A卷组2", "关系代数3", "关系代数", "查询选修了“软件工程”课程的学生学号、姓名和成绩。", "πSno,Sname,Grade(Student ⨝ SC ⨝ σCname='软件工程'(Course))。"),
      short("A卷组2", "概念设计1", "E-R 图", "运动会报名系统：运动会由学院申报项目；每个学院有编号、名称、联系电话；每个项目有编号、名称、比赛场地；每个学院派多名运动员参加运动会，每个运动员可参加多个项目且有姓名、性别、年龄、比赛成绩；每个学院指定一个运动员为负责人。请设计 E-R 图。", "实体：学院、项目、运动员。联系：学院-运动员为 1:N 的派出/隶属；运动员-项目为 M:N 的参加，联系属性为比赛成绩；学院-项目可建申报/组织联系；学院-运动员还有 1:1 或 1:N 中选一人的负责人联系。主要属性按题面放入对应实体。"),
      short("A卷组2", "教师SQL1", "SQL 建表", "Teacher(教师编号,姓名,年龄,院系) 和 Salary(月份,教师编号,基本工资,岗位津贴,扣除)。写 SQL 创建表，要求 Teacher 姓名非空，年龄不超过 60 岁。", "CREATE TABLE Teacher(教师编号 CHAR(10) PRIMARY KEY, 姓名 VARCHAR(20) NOT NULL, 年龄 INT CHECK(年龄<=60), 院系 VARCHAR(50)); CREATE TABLE Salary(月份 INT, 教师编号 CHAR(10), 基本工资 DECIMAL(10,2), 岗位津贴 DECIMAL(10,2), 扣除 DECIMAL(10,2), PRIMARY KEY(月份,教师编号), FOREIGN KEY(教师编号) REFERENCES Teacher(教师编号));"),
      short("A卷组2", "教师SQL2", "SQL 插入", "写 SQL：将 Teacher 和 Salary 表前三行示例数据分别插入对应表。", "INSERT INTO Teacher VALUES('T01','张明',45,'数学系'); INSERT INTO Teacher VALUES('T02','李云芳',NULL,'机械系'); INSERT INTO Teacher VALUES('T03','赵刚',50,NULL); INSERT INTO Salary VALUES(1,'T01',4000,2000,1000.00); INSERT INTO Salary VALUES(1,'T02',3000,0,200.50); INSERT INTO Salary VALUES(2,'T01',5000,2500,0.00);"),
      short("A卷组2", "教师SQL3", "SQL 更新", "写 SQL：将编号为 T10 的教师 6 月份的基本工资改为 100，岗位津贴改为 500。", "UPDATE Salary SET 基本工资=100, 岗位津贴=500 WHERE 教师编号='T10' AND 月份=6;"),
      short("A卷组2", "教师SQL4", "SQL 查询", "写 SQL：查询基本工资总额大于 5000 元的教师编号、姓名、工资发放次数、基本工资总额和月平均基本工资。", "SELECT T.教师编号,T.姓名,COUNT(*) AS 工资发放次数,SUM(S.基本工资) AS 基本工资总额,AVG(S.基本工资) AS 月平均基本工资 FROM Teacher T JOIN Salary S ON T.教师编号=S.教师编号 GROUP BY T.教师编号,T.姓名 HAVING SUM(S.基本工资)>5000;"),
      short("A卷组2", "教师SQL5", "SQL 查询", "写 SQL：查询教师工资明细，显示月份、教师编号、姓名、基本工资、岗位工资、应发工资、扣除、实发工资。", "SELECT S.月份,S.教师编号,T.姓名,S.基本工资,S.岗位津贴 AS 岗位工资,(S.基本工资+S.岗位津贴) AS 应发工资,S.扣除,(S.基本工资+S.岗位津贴-S.扣除) AS 实发工资 FROM Salary S JOIN Teacher T ON S.教师编号=T.教师编号;")
    ];

    allQuestions.push(...extraQuestions);

    const WRONG_KEY = "databaseQuizWrongQuestions.v1";
    const ANSWERS_KEY = "databaseQuizAnswers.v1";
    let order = [...allQuestions.keys()];
    const state = {
      pos: 0,
      answers: loadAnswers(),
      filtered: [...order],
      wrongBook: loadWrongBook(),
      wrongMode: false
    };

    const els = {
      count: document.getElementById("count"),
      done: document.getElementById("done"),
      right: document.getElementById("right"),
      wrongCount: document.getElementById("wrongCount"),
      rate: document.getElementById("rate"),
      bar: document.getElementById("bar"),
      source: document.getElementById("source"),
      topic: document.getElementById("topic"),
      status: document.getElementById("status"),
      question: document.getElementById("question"),
      options: document.getElementById("options"),
      explain: document.getElementById("explain"),
      prev: document.getElementById("prev"),
      next: document.getElementById("next"),
      reset: document.getElementById("reset"),
      wrongMode: document.getElementById("wrongMode"),
      shuffle: document.getElementById("shuffle"),
      clearWrong: document.getElementById("clearWrong"),
      sourceFilter: document.getElementById("sourceFilter"),
      topicFilter: document.getElementById("topicFilter"),
      nav: document.getElementById("nav"),
      breakdown: document.getElementById("breakdown"),
      wrongList: document.getElementById("wrongList")
    };

    function loadWrongBook() {
      try {
        const raw = localStorage.getItem(WRONG_KEY);
        const values = raw ? JSON.parse(raw) : [];
        return new Set(values.filter(idx => Number.isInteger(idx) && allQuestions[idx]));
      } catch {
        return new Set();
      }
    }

    function saveWrongBook() {
      localStorage.setItem(WRONG_KEY, JSON.stringify([...state.wrongBook]));
    }

    function loadAnswers() {
      try {
        const raw = localStorage.getItem(ANSWERS_KEY);
        const values = raw ? JSON.parse(raw) : [];
        const entries = values
          .filter(([idx, value]) => Number.isInteger(idx) && allQuestions[idx] && value && typeof value.correct === "boolean")
          .map(([idx, value]) => [idx, { ...value, correct: Boolean(value.correct) }]);
        return new Map(entries);
      } catch {
        return new Map();
      }
    }

    function saveAnswers() {
      localStorage.setItem(ANSWERS_KEY, JSON.stringify([...state.answers.entries()]));
    }

    function unique(values) {
      return [...new Set(values)];
    }

    function fillFilters() {
      const sources = unique(allQuestions.map(item => item.source));
      const topics = unique(allQuestions.map(item => item.topic)).sort((a, b) => a.localeCompare(b, "zh-CN"));
      els.sourceFilter.innerHTML = `<option value="">全部试卷</option>` + sources.map(v => `<option>${v}</option>`).join("");
      els.topicFilter.innerHTML = `<option value="">全部知识点</option>` + topics.map(v => `<option>${v}</option>`).join("");
    }

    function applyFilters() {
      const source = els.sourceFilter.value;
      const topic = els.topicFilter.value;
      state.filtered = order.filter(idx => {
        const item = allQuestions[idx];
        return (!state.wrongMode || state.wrongBook.has(idx))
          && (!source || item.source === source)
          && (!topic || item.topic === topic);
      });
      state.pos = 0;
      render();
    }

    function currentIndex() {
      return state.filtered[state.pos];
    }

    function currentQuestion() {
      return allQuestions[currentIndex()];
    }

    function render() {
      if (state.filtered.length === 0) {
        els.source.textContent = "无题目";
        els.topic.textContent = "请调整筛选";
        els.status.textContent = "";
        els.question.textContent = "当前筛选条件下没有题目。";
        els.options.innerHTML = "";
        els.explain.style.display = "none";
        renderStats();
        renderNav();
        renderBreakdown();
        renderWrongList();
        return;
      }

      const idx = currentIndex();
      const item = currentQuestion();
      const existing = state.answers.get(idx);
      els.source.textContent = `${item.source} · 第 ${item.no} 题`;
      els.topic.textContent = item.topic;
      els.question.textContent = item.text;
      els.options.innerHTML = "";
      els.status.textContent = statusText(item, existing);
      els.status.style.color = existing ? (existing.correct ? "var(--ok)" : "var(--bad)") : "var(--ink)";
      els.explain.innerHTML = explanationHtml(item);
      els.explain.style.display = existing ? "block" : "none";

      if (item.type === "judge") {
        renderJudge(item, existing);
      } else if (item.type === "blank") {
        renderBlank(item, existing);
      } else if (item.type === "short") {
        renderShort(item, existing);
      } else {
        renderChoice(item, existing);
      }

      renderStats();
      renderNav();
      renderBreakdown();
      renderWrongList();
    }

    function statusText(item, existing) {
      if (!existing) {
        if (item.type === "short") return "先作答，再看参考答案";
        if (item.type === "blank") return "填写后核对";
        return "请选择一个答案";
      }
      if (item.type === "short") return existing.correct ? "已掌握 ✅" : "待复习 ❌";
      return existing.correct ? "答对了 ✅" : "答错了 ❌";
    }

    function answerLabel(item) {
      if (item.type === "blank") {
        return item.answers.map(group => group[0]).join(" / ");
      }
      if (item.type === "judge") {
        return item.answer ? "正确" : "错误";
      }
      if (item.type === "short") {
        return item.sample;
      }
      return item.options[item.answer];
    }

    function explanationHtml(item) {
      if (item.type === "short") {
        return `<strong>讲解：</strong>${item.explain}`;
      }
      return `<strong>参考答案：</strong>${answerLabel(item)}<br><strong>讲解：</strong>${item.explain}`;
    }

    function renderChoice(item, existing) {
      item.options.forEach((text, optionIndex) => {
        const button = document.createElement("button");
        button.className = "option";
        button.type = "button";
        button.innerHTML = `<span class="letter">${String.fromCharCode(65 + optionIndex)}</span><span>${text}</span><span class="mark"></span>`;
        button.addEventListener("click", () => choose(optionIndex));
        if (existing) {
          button.disabled = true;
          const mark = button.querySelector(".mark");
          if (optionIndex === item.answer) {
            button.classList.add("correct");
            mark.textContent = "✅";
          }
          if (optionIndex === existing.pick && !existing.correct) {
            button.classList.add("wrong");
            mark.textContent = "❌";
          }
        }
        els.options.appendChild(button);
      });
    }

    function renderJudge(item, existing) {
      [
        { label: "正确", value: true },
        { label: "错误", value: false }
      ].forEach((entry, optionIndex) => {
        const button = document.createElement("button");
        button.className = "option";
        button.type = "button";
        button.innerHTML = `<span class="letter">${optionIndex ? "F" : "T"}</span><span>${entry.label}</span><span class="mark"></span>`;
        button.addEventListener("click", () => chooseJudge(entry.value));
        if (existing) {
          button.disabled = true;
          const mark = button.querySelector(".mark");
          if (entry.value === item.answer) {
            button.classList.add("correct");
            mark.textContent = "✅";
          }
          if (entry.value === existing.pick && !existing.correct) {
            button.classList.add("wrong");
            mark.textContent = "❌";
          }
        }
        els.options.appendChild(button);
      });
    }

    function renderBlank(item, existing) {
      const work = document.createElement("div");
      work.className = "work-area";
      item.answers.forEach((answerGroup, idx) => {
        const input = document.createElement("input");
        input.className = "blank-input";
        input.placeholder = item.answers.length > 1 ? `第 ${idx + 1} 空` : "在这里输入答案";
        input.value = existing?.pick?.[idx] || "";
        input.disabled = Boolean(existing);
        work.appendChild(input);
      });

      const submit = document.createElement("button");
      submit.className = "btn primary";
      submit.type = "button";
      submit.textContent = existing ? "已核对" : "提交并核对";
      submit.disabled = Boolean(existing);
      submit.addEventListener("click", () => submitBlank([...work.querySelectorAll("input")].map(input => input.value)));
      work.appendChild(submit);
      els.options.appendChild(work);
    }

    function renderShort(item, existing) {
      const work = document.createElement("div");
      work.className = "work-area";

      const textarea = document.createElement("textarea");
      textarea.className = "answer-box";
      textarea.placeholder = "先写你的答案。意思对即可，不用和参考答案逐字一样。";
      textarea.value = existing?.pick || "";
      textarea.disabled = Boolean(existing);
      work.appendChild(textarea);

      const reveal = document.createElement("button");
      reveal.className = "btn primary";
      reveal.type = "button";
      reveal.textContent = existing ? "已显示参考答案" : "显示参考答案";
      work.appendChild(reveal);

      const answerCard = document.createElement("div");
      answerCard.className = "answer-card";
      answerCard.innerHTML = `<strong>参考答案：</strong>${item.sample}`;
      if (existing) answerCard.style.display = "block";
      work.appendChild(answerCard);

      const selfActions = document.createElement("div");
      selfActions.className = "self-actions";
      selfActions.innerHTML = `
        <button class="btn ok" type="button" data-self="ok">意思对，标记掌握</button>
        <button class="btn danger" type="button" data-self="bad">还不熟，加入错题</button>
      `;
      if (!existing) selfActions.style.display = "none";
      if (existing) selfActions.style.display = "grid";
      work.appendChild(selfActions);

      reveal.addEventListener("click", () => {
        answerCard.style.display = "block";
        selfActions.style.display = "grid";
        reveal.disabled = true;
      });

      selfActions.querySelector('[data-self="ok"]').addEventListener("click", () => markShort(textarea.value, true));
      selfActions.querySelector('[data-self="bad"]').addEventListener("click", () => markShort(textarea.value, false));
      els.options.appendChild(work);
    }

    function recordAnswer(idx, value) {
      state.answers.set(idx, value);
      if (value.correct) {
        state.wrongBook.delete(idx);
      } else {
        state.wrongBook.add(idx);
      }
      saveWrongBook();
      saveAnswers();
      render();
    }

    function choose(optionIndex) {
      const idx = currentIndex();
      const item = allQuestions[idx];
      if (state.answers.has(idx)) return;
      const correct = optionIndex === item.answer;
      recordAnswer(idx, {
        pick: optionIndex,
        correct
      });
    }

    function chooseJudge(value) {
      const idx = currentIndex();
      const item = allQuestions[idx];
      if (state.answers.has(idx)) return;
      recordAnswer(idx, {
        pick: value,
        correct: value === item.answer
      });
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/[\s，。、“”‘’'":：；;,.()（）]/g, "");
    }

    function submitBlank(values) {
      const idx = currentIndex();
      const item = allQuestions[idx];
      if (state.answers.has(idx)) return;
      const correct = item.answers.every((answerGroup, answerIndex) => {
        const value = normalize(values[answerIndex]);
        return value && answerGroup.some(candidate => {
          const expected = normalize(candidate);
          return value.includes(expected) || expected.includes(value);
        });
      });
      recordAnswer(idx, {
        pick: values,
        correct
      });
    }

    function markShort(value, mastered) {
      const idx = currentIndex();
      recordAnswer(idx, {
        pick: value || "已查看参考答案",
        correct: mastered,
        subjective: true
      });
    }

    function renderStats() {
      const done = state.answers.size;
      const right = [...state.answers.values()].filter(v => v.correct).length;
      const rate = done ? Math.round((right / done) * 100) : 0;
      const total = state.filtered.length || 0;
      els.count.textContent = total ? `${state.pos + 1} / ${total}` : `0 / 0`;
      els.done.textContent = done;
      els.right.textContent = right;
      els.wrongCount.textContent = state.wrongBook.size;
      els.rate.textContent = `${rate}%`;
      els.bar.style.width = `${Math.round((done / allQuestions.length) * 100)}%`;
      els.wrongMode.textContent = state.wrongMode ? "查看全部题" : "只看错题";
      els.wrongMode.classList.toggle("active", state.wrongMode);
    }

    function renderNav() {
      els.nav.innerHTML = "";
      state.filtered.forEach((idx, navIndex) => {
        const item = allQuestions[idx];
        const result = state.answers.get(idx);
        const button = document.createElement("button");
        button.className = "nav-q";
        if (navIndex === state.pos) button.classList.add("current");
        if (result) button.classList.add(result.correct ? "ok" : "bad");
        button.type = "button";
        button.textContent = `${navIndex + 1}`;
        button.title = `${item.source} 第 ${item.no} 题`;
        button.addEventListener("click", () => {
          state.pos = navIndex;
          render();
        });
        els.nav.appendChild(button);
      });
    }

    function renderBreakdown() {
      const counts = {};
      state.filtered.forEach(idx => {
        const topic = allQuestions[idx].topic;
        counts[topic] = (counts[topic] || 0) + 1;
      });
      els.breakdown.innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "zh-CN"))
        .map(([topic, count]) => `<div class="break-item"><span>${topic}</span><strong>${count}</strong></div>`)
        .join("");
    }

    function renderWrongList() {
      const wrongItems = [...state.wrongBook]
        .filter(idx => allQuestions[idx])
        .sort((a, b) => a - b);

      if (!wrongItems.length) {
        els.wrongList.innerHTML = `<p class="empty">暂时没有错题。答错后会自动收进这里；之后重新做对会自动移出。</p>`;
        els.clearWrong.disabled = true;
        return;
      }

      els.clearWrong.disabled = false;
      els.wrongList.innerHTML = "";
      wrongItems.forEach(idx => {
        const item = allQuestions[idx];
        const button = document.createElement("button");
        button.className = "wrong-item";
        button.type = "button";
        button.innerHTML = `<strong>${item.source} · 第 ${item.no} 题 · ${item.topic}</strong><span>${item.text}</span>`;
        button.addEventListener("click", () => {
          if (state.wrongMode || !state.filtered.includes(idx)) {
            state.wrongMode = true;
            applyFilters();
          }
          const target = state.filtered.indexOf(idx);
          if (target >= 0) {
            state.pos = target;
            render();
          }
        });
        els.wrongList.appendChild(button);
      });
    }

    function move(delta) {
      if (!state.filtered.length) return;
      state.pos = (state.pos + delta + state.filtered.length) % state.filtered.length;
      render();
    }

    function shuffle() {
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      applyFilters();
    }

    function toggleWrongMode() {
      state.wrongMode = !state.wrongMode;
      applyFilters();
    }

    function clearWrongBook() {
      if (!state.wrongBook.size) return;
      state.wrongBook.clear();
      saveWrongBook();
      if (state.wrongMode) {
        applyFilters();
      } else {
        render();
      }
    }

    function reset() {
      state.answers.clear();
      localStorage.removeItem(ANSWERS_KEY);
      state.pos = 0;
      render();
    }

    els.prev.addEventListener("click", () => move(-1));
    els.next.addEventListener("click", () => move(1));
    els.reset.addEventListener("click", reset);
    els.wrongMode.addEventListener("click", toggleWrongMode);
    els.shuffle.addEventListener("click", shuffle);
    els.clearWrong.addEventListener("click", clearWrongBook);
    els.sourceFilter.addEventListener("change", applyFilters);
    els.topicFilter.addEventListener("change", applyFilters);

    fillFilters();
    applyFilters();

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
